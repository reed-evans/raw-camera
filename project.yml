name: RAWCamera
options:
  bundleIdPrefix: com.rawcamera
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  CameraCore:
    path: CameraCore
targets:
  RAWCamera:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: CameraCore
        product: CameraCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rawcamera.app
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        # iPhone-only: a portrait-locked camera app can't satisfy the iPad
        # all-orientations requirement App Store validation enforces.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Q8G4Y7Y9QR
        # NOTE: CI builds pass CODE_SIGNING_ALLOWED=NO on the xcodebuild command
        # line (see scripts/gates.sh) — it is intentionally NOT baked in here, so
        # Xcode can sign for a device.
        MTL_FAST_MATH: YES
  RAWCameraUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppUITests
    dependencies:
      - target: RAWCamera
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rawcamera.app.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
schemes:
  RAWCamera:
    build:
      targets:
        RAWCamera: all
    test:
      targets:
        - RAWCameraUITests
