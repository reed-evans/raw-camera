name: RAWCamera
options:
  bundleIdPrefix: com.rawcamera
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  CameraCore:
    path: CameraCore
targets:
  RAWCamera:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: CameraCore
        product: CameraCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rawcamera.app
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        # Automatic signing for the on-device run (Tier 3 gate). Set your team in
        # Xcode > Signing & Capabilities, or set DEVELOPMENT_TEAM here.
        CODE_SIGN_STYLE: Automatic
        # NOTE: CI builds pass CODE_SIGNING_ALLOWED=NO on the xcodebuild command
        # line (see scripts/gates.sh) — it is intentionally NOT baked in here, so
        # Xcode can sign for a device.
        MTL_FAST_MATH: YES
